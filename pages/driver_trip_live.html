<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Viaje en Curso | ManiRuta</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/home.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <div class="brand"><span class="dot"></span> Viaje en Curso</div>
    <div class="nav-right">
      <span class="pill" id="who">...</span>
      <a class="btn btn-ghost" href="driver_trips.html">Volver</a>
      <button class="btn btn-ghost" id="logout">Salir</button>
    </div>
  </div>
</header>

<main class="container page stack">
  <section class="card tile">
    <div class="page-title">
      <div>
        <h1 class="h1" id="tripTitle">Viaje en curso</h1>
        <p class="sub">Comparte la ultima posicion del vehiculo sin generar historial acumulado.</p>
      </div>
    </div>

    <div class="footer-actions" id="tripMeta"></div>

    <div id="driverMap"></div>

    <div class="stop-actions">
      <button class="btn btn-primary" id="startTracking">Iniciar ubicacion</button>
      <button class="btn btn-ghost" id="stopTracking">Detener ubicacion</button>
    </div>

    <div id="ok" class="toast" style="display:none;"></div>
    <div id="err" class="error" style="display:none;"></div>
  </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="../js/driver_trip_live_page.js"></script>

</body>
</html>
