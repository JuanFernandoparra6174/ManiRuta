<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Seguimiento de Viaje | ManiRuta</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/home.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <div class="brand"><span class="dot"></span> Seguimiento de Viaje</div>
    <div class="nav-right">
      <span class="pill" id="companyChip">company_id: ...</span>
      <span class="pill" id="who">...</span>
      <a class="btn btn-ghost" href="company_trips.html">Volver</a>
      <button class="btn btn-ghost" id="logout">Salir</button>
    </div>
  </div>
</header>

<main class="container page stack">
  <section class="card tile passenger-live-layout">
    <section class="passenger-side">
      <div class="page-title">
        <div>
          <h1 class="h1" id="tripTitle">Seguimiento de viaje</h1>
          <p class="sub">Visualiza la ruta, la posicion actual del bus y eventos de geofencing.</p>
        </div>
        <span class="chip ok">EMPRESA</span>
      </div>

      <div class="footer-actions" id="tripMeta"></div>

      <section class="card tile trip-summary-card">
        <div class="page-title">
          <div>
            <h2 class="h1">Evento de geofencing</h2>
            <p class="sub">Se dispara cuando el bus entra en un radio de 60 m de un paradero.</p>
          </div>
        </div>
        <div id="geofenceCard"></div>
      </section>

      <div id="ok" class="toast" style="display:none;"></div>
      <div id="err" class="error" style="display:none;"></div>
    </section>

    <section class="passenger-map-card">
      <div id="companyTripMap"></div>
    </section>
  </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="../js/company_trip_live_page.js"></script>

</body>
</html>
