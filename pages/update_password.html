<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nueva contrasena | ManiRuta</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-bg"></div>

    <div class="auth">
      <section class="hero card">
        <div class="img" id="heroImg"></div>

        <div class="brand"><span class="dot"></span> ManiRuta</div>
        <h1>Crea una nueva<br/>contrasena.</h1>
        <p>El enlace del correo habilita temporalmente este formulario para proteger tu cuenta.</p>
        <div class="stats">
          <span class="badge">Enlace temporal</span>
          <span class="badge">Minimo 8 caracteres</span>
          <span class="badge">Redireccion segura</span>
        </div>
      </section>

      <section class="panel card">
        <div class="topbar">
          <div>
            <div class="help">Seguridad</div>
            <div style="font-weight:900; font-size:20px;">Actualizar contrasena</div>
          </div>
          <a class="btn btn-ghost" href="login.html">Login</a>
        </div>

        <div id="state" class="toast">Validando enlace de recuperacion...</div>

        <form class="form" id="updatePasswordForm" autocomplete="new-password" style="display:none;">
          <div>
            <label class="help" for="password">Nueva contrasena</label>
            <input class="input" type="password" id="password" required minlength="8" placeholder="minimo 8 caracteres" />
          </div>

          <div>
            <label class="help" for="confirm">Confirmar contrasena</label>
            <input class="input" type="password" id="confirm" required minlength="8" placeholder="repite la contrasena" />
          </div>

          <div id="err" class="error" style="display:none;"></div>
          <div id="ok" class="toast" style="display:none;"></div>

          <button class="btn btn-primary" id="updateSubmit" type="submit">Actualizar contrasena</button>
        </form>
      </section>
    </div>
  </div>

  <script type="module">
    import { initUpdatePasswordPage } from "../js/password_reset.js";

    const IMG_AUTH_BG = "https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1400&q=70";
    document.getElementById("heroImg").style.backgroundImage = `url('${IMG_AUTH_BG}')`;

    initUpdatePasswordPage();
  </script>
</body>
</html>
