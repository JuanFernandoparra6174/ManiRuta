<section class="card tile">
    <h2 class="h1">🏢 Registrar Empresa de Bus</h2>
    <form id="companyForm" class="stack" style="margin-top:15px;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="text" id="compName" class="input" placeholder="Nombre Empresa" required>
            <input type="text" id="compNit" class="input" placeholder="NIT">
        </div>
        <input type="email" id="compEmail" class="input" placeholder="Correo Electrónico">
        <button type="submit" class="btn btn-primary">Registrar Empresa</button>
    </form>
</section>
