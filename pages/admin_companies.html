<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Admin - Empresas | ManiRuta</title>
    <link rel="stylesheet" href="../css/base.css"/>
    <link rel="stylesheet" href="../css/home.css"/>
</head>
<body>
    <header class="nav">
        <div class="container nav-inner">
            <div class="brand"><span class="dot"></span> Registro de Empresas</div>
            <a href="home_admin.html" class="btn btn-ghost">Volver</a>
        </div>
    </header>

    <main class="container page stack">
        <section class="card tile">
            <h2 class="h1">🏢 Registrar Empresa y Usuario</h2>
            <p class="sub">Al llenar este formulario, se creará la empresa y el acceso para que el dueño inicie sesión.</p>
            
            <form id="companyForm" class="stack" style="margin-top:15px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" id="compName" class="input" placeholder="Nombre Empresa" required>
                    <input type="text" id="compNit" class="input" placeholder="NIT" required>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="email" id="compEmail" class="input" placeholder="Correo Electrónico (Para Login)" required>
                    <input type="password" id="compPassword" class="input" placeholder="Contraseña de acceso" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary">Crear Empresa y Cuenta</button>
            </form>
        </section>

        <section class="card tile" style="overflow-x:auto;">
            <table class="table">
                <thead>
                    <tr>
                        <th>Empresa</th>
                        <th>NIT</th>
                        <th>Email de Acceso</th>
                    </tr>
                </thead>
                <tbody id="companiesTable"></tbody>
            </table>
        </section>
    </main>

    <script type="module">
        import { fetchCompanies, createCompanyWithAccount } from "../js/companies.js";
        import { requireAuthAndRole } from "../js/guard.js";

        await requireAuthAndRole(3); // Solo Admin

        const form = document.getElementById("companyForm");
        const tableBody = document.getElementById("companiesTable");

        async function loadCompanies() {
            try {
                const companies = await fetchCompanies();
                tableBody.innerHTML = companies.map(c => `
                    <tr>
                        <td><b>${c.name}</b></td>
                        <td>${c.nit || '—'}</td>
                        <td>${c.email || '—'}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error al cargar empresas:", err);
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const name = document.getElementById("compName").value.trim();
            const nit = document.getElementById("compNit").value.trim();
            const email = document.getElementById("compEmail").value.trim();
            const password = document.getElementById("compPassword").value;

            try {
                // Llamamos a la nueva función
                await createCompanyWithAccount({ name, nit, email, password });
                
                alert("✅ Empresa y cuenta de usuario creadas con éxito.");
                form.reset();
                loadCompanies();
            } catch (err) {
                alert("❌ Error: " + err.message);
                console.error(err);
            }
        });

        loadCompanies();
    </script>
</body>
</html>
