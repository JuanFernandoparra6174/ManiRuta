<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Rutas Disponibles | ManiRuta</title>
    <link rel="stylesheet" href="../css/base.css"/>
    <link rel="stylesheet" href="../css/home.css"/>
</head>
<body>
    <header class="nav">
        <div class="container nav-inner">
            <div class="brand"><span class="dot"></span> Rutas ManiRuta</div>
            <a href="home_passenger.html" class="btn btn-ghost">Volver</a>
        </div>
    </header>

    <main class="container page stack">
        <section class="card tile">
            <h2 class="h1">Encuentra tu ruta</h2>
            <input type="text" id="routeSearch" class="input" placeholder="Buscar por nombre..." style="margin-top:10px;">
        </section>

        <div id="routesList" class="stack"></div>
    </main>

    <script type="module">
        import { fetchAllRoutes } from "../js/routes_passenger.js";
        import { requireAuthAndRole } from "../js/guard.js";

        await requireAuthAndRole(1);

        const list = document.getElementById("routesList");
        const searchInput = document.getElementById("routeSearch");
        let allRoutes = [];

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function render(routes) {
            if (!routes.length) {
                list.innerHTML = `<div class="card help">No hay rutas activas en este momento.</div>`;
                return;
            }

            list.innerHTML = routes.map((route) => `
                <div class="card tile passenger-route-card">
                    <div class="pill passenger-route-pill">RUTA</div>
                    <div style="flex:1;">
                        <h3 style="margin:0;">${escapeHtml(route.name)}</h3>
                        <p class="sub" style="margin:4px 0;">Sentido: <b>${escapeHtml(route.direction || "IDA")}</b></p>
                    </div>
                    <a class="btn btn-primary" href="passenger_route_live.html?route_id=${route.id}">Ver viajes</a>
                </div>
            `).join("");
        }

        async function load() {
            try {
                allRoutes = await fetchAllRoutes();
                render(allRoutes);
            } catch (error) {
                list.innerHTML = `<p class="sub" style="color:red;">Error al cargar: ${escapeHtml(error.message)}</p>`;
            }
        }

        searchInput.addEventListener("input", (event) => {
            const term = event.target.value.toLowerCase();
            const filtered = allRoutes.filter((route) => route.name.toLowerCase().includes(term));
            render(filtered);
        });

        await load();
    </script>
</body>
</html>
